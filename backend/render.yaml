services:
  - type: web
    name: finsurge-enrims-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SEED_ON_STARTUP
        value: "true"
      - key: SECRET_KEY
        generateValue: true
