version: "3.8"

services:
  # ── PostgreSQL (matches RDS in production) ─────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: finsurge_enrims
      POSTGRES_USER: finsurge_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsurge_admin -d finsurge_enrims"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (matches ElastiCache in production) ──────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://finsurge_admin:${DB_PASSWORD:-localdev123}@postgres:5432/finsurge_enrims
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - PII_ENCRYPTION_KEY=${PII_ENCRYPTION_KEY:-change-me-in-production}
      - DEBUG=false
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - SEED_ON_STARTUP=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ── Frontend (React + Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
