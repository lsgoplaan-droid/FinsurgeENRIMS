# Netlify Configuration for FinsurgeENRIMS Frontend

[build]
base = "frontend"
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "20"
VITE_API_URL = "/api/v1"

# Redirect API calls to backend
[[redirects]]
from = "/api/v1/*"
to = "https://finsurgeenrims.onrender.com/api/v1/:splat"
status = 200
force = true

# Redirect root to index.html for React Router
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Headers for security
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), camera=(), microphone=()"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

# Handle Netlify Functions (if needed later)
[functions]
directory = "netlify/functions"
